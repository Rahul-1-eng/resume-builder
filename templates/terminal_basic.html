{% extends 'layout.html' %}
{% block title %}Terminal · ResumeForge{% endblock %}
{% block content %}
<div class="terminal-wrapper mx-auto">
    <div class="terminal-card">
        <div class="terminal-header">
            <div class="dots"><span></span><span></span><span></span></div>
            <div class="terminal-title">Basic Text Analyzer · {{ resume.full_name }}</div>
        </div>
        <div class="terminal-body">
            <h2 class="text-white mb-2">Palindrome checker</h2>
            <p class="text-white-50">Quick basic terminal for testing text symmetry.</p>
            <form method="post">
                <label class="form-label text-white-50">Input</label>
                <input type="text" class="form-control terminal-input mb-3" id="input_str" name="input_str" value="{{ input_str }}" placeholder="racecar">
                <button type="submit" class="btn btn-gradient">Run Check</button>
            </form>
            {% if result is not none %}
            <div class="terminal-output mt-4">
                <div class="small text-uppercase text-white-50">Result</div>
                <div class="fs-4 fw-bold text-white">{{ result }}</div>
            </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
